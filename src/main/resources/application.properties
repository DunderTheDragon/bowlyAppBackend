spring.application.name=bowlyApp

# Database — w Dockerze compose przekazuje POSTGRES_* i SPRING_DATASOURCE_* z .env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/bowly_db}
spring.datasource.username=${POSTGRES_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${POSTGRES_PASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — schemat zarządzany wyłącznie przez Flyway
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Bezpieczeństwo — ustaw w .env / zmiennych środowiskowych (brak domyślnych wartości produkcyjnych)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.registration.secret=${REGISTRATION_SECRET}

# HTTP — domyślnie 8742 (rzadziej koliduje z innymi serwisami niż 8080)
server.port=${SERVER_PORT:8742}
