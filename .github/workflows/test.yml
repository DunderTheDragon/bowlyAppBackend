name: Backend Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bowly_test
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      TESTCONTAINERS_RYUK_DISABLED: true
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: bowly_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Print failed tests
        if: failure()
        run: |
          echo "::group::Failed test cases"
          find build/test-results/test -name 'TEST-*.xml' -print0 2>/dev/null | while IFS= read -r -d '' f; do
            if grep -qE '<failure|<error' "$f" 2>/dev/null; then
              suite=$(grep -oP 'testsuite name="\K[^"]+' "$f" | head -1)
              msg=$(grep -oP '(failure|error) message="\K[^"]+' "$f" | head -1 | cut -c1-500)
              echo "=== $suite ==="
              echo "$msg"
              echo "::error title=${suite}::${msg}"
            fi
          done
          echo "::endgroup::"

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
          retention-days: 14
