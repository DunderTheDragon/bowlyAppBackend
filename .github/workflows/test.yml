name: Backend Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Print failed tests
        if: failure()
        run: |
          echo "::group::Failed test cases"
          find build/test-results/test -name 'TEST-*.xml' -print0 2>/dev/null | while IFS= read -r -d '' f; do
            if grep -qE '<failure|<error' "$f" 2>/dev/null; then
              suite=$(grep -oP 'testsuite name="\K[^"]+' "$f" | head -1)
              msg=$(grep -oP '(failure|error) message="\K[^"]+' "$f" | head -1 | cut -c1-500)
              echo "=== $suite ==="
              echo "$msg"
              echo "::error title=${suite}::${msg}"
            fi
          done
          echo "::endgroup::"

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
          retention-days: 14
